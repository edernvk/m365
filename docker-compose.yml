services:
  migrator:
    build: .
    container_name: m365-migrator
    environment:
      - NODE_ENV=production
      - VERBOSE=false
      - TZ=America/Sao_Paulo          # ← ADICIONE ESTA LINHA
    volumes:
      - ./config.json:/app/config.json:ro
      - ./users.csv:/app/users.csv:ro
      - ./logs:/app/logs
      - ./resume.json:/app/resume.json
    command: node src/migrator.js --workload all
    restart: "no"

  migrate-email:
    build: .
    container_name: m365-migrator-email
    environment:
      - TZ=America/Sao_Paulo          # ← ADICIONE ESTA LINHA
    volumes:
      - ./config.json:/app/config.json:ro
      - ./users.csv:/app/users.csv:ro
      - ./logs:/app/logs
      - ./resume.json:/app/resume.json
    command: node src/migrator.js --workload email
    profiles: ["email"]

  migrate-onedrive:
    build: .
    container_name: m365-migrator-onedrive
    environment:
      - TZ=America/Sao_Paulo          # ← ADICIONE ESTA LINHA
    volumes:
      - ./config.json:/app/config.json:ro
      - ./users.csv:/app/users.csv:ro
      - ./logs:/app/logs
      - ./resume.json:/app/resume.json
    command: node src/migrator.js --workload onedrive
    profiles: ["onedrive"]

  status:
    build: .
    container_name: m365-migrator-status
    environment:
      - TZ=America/Sao_Paulo          # ← ADICIONE ESTA LINHA
    volumes:
      - ./config.json:/app/config.json:ro
      - ./logs:/app/logs
      - ./resume.json:/app/resume.json
    command: node src/status.js
    profiles: ["status"]

  dashboard:
    build: .
    container_name: m365-email-dashboard
    environment:
      - TZ=America/Sao_Paulo
      - PORT=3001
    volumes:
      - ./config.json:/app/config.json:ro
      - ./users.csv:/app/users.csv
      - ./logs:/app/logs
      - ./resume.json:/app/resume.json
    ports:
      - "3003:3001"
    command: node src/dashboardServer.js
    restart: unless-stopped
    profiles: ["dashboard"]